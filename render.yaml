services:
  # Backend Web Service
  - type: web
    name: ask-my-docs-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # User will fill this in the UI
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Static Site
  - type: static_site
    name: ask-my-docs-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ask-my-docs-backend
          type: web
          property: url
