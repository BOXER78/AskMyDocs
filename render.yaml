services:
  # Backend: Python FastAPI Web Service
  - type: web
    name: ask-my-docs-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend: React Vite Static Site
  - type: web
    name: ask-my-docs-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set this to your backend's public URL in Render dashboard (e.g. https://your-app.onrender.com/api)

